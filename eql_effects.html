, {"effect": "Word of Health", "type": "click", "item": "Rod of Health", "slot": "PRIMARY", "classes": "CLR", "race": "ALL", "stats": "Delay: 30 DMG: 6", "notrade": "", "tags": "Instant Click Equipment", "drops": "Kedge Keep: A seahorse matriarch"}],DESC={"Affliction Efficiency I": "Reduces the mana cost of long term detrimental spells by up to 25%. This bonus will decay on spells over level 20.", "Affliction Efficiency II": "Reduces the mana cost of long term detrimental spells by up to 25%. This bonus will decay on spells over level 44.", "Affliction Haste I": "Reduces the cast time of long term detrimental spells by 33%. This bonus will decay on spells over level 20.", "Affliction Haste II": "Reduces the cast time of long term detrimental spells by 33%. This bonus will decay on spells over level 44.", "Allure": "Dominates your target's mind, allowing you to control them for a short time. This spell works on creatures up to level 51.", "Allure of Death": "Grips your body in an unholy darkness, slowly draining your hit points while regenerating your mana.", "Banish Undead": "A burst of holy power that inflicts 468 damage to an undead target.", "Berserker Strength": "Hardens your skin and fills your arms with energy, increasing strength and absorbing damage, while also decreasing your agility.", "Blanket of Forgetfulness": "Attacks the minds of all enemies in the vicinity of your target, providing a chance to forget those that have done them harm.", "Blaze": "Burns your target's skin with blazing flame, causing 418 damage.", "Blood Claw": "Poisons your target's blood, causing 20 initial damage and 15 damage every 6 seconds for up to 12 secs (2 ticks).", "Boneshear": "", "Brass Resonance 14": "Increases the power of brass instrument based bard songs by up to 140%.", "Burn": "Burns your target's skin with fire, causing 14 damage.", "Burning Affliction I": "Increases the damage of long term detrimental spells by up to 20%. This bonus will decay on spells over level 20.", "Burning Affliction II": "Increases the damage of long term detrimental spells by up to 20%. This bonus will decay on spells over level 44.", "Burning Affliction III": "Increases the damage of long term detrimental spells by up to 20%. This bonus will decay on spells over level 60.", "Burrowing Scarab": "Tiny scarabs burrow into your target's skin, causing 50 damage initially and 50 damage every 6 seconds for up to 3 minutes (1 ticks @L1 to 3.0 mins @L60).", "Burst of Flame": "Creates a ball of fire that burns your target, doing 5 damage.", "Cascading Darkness": "Summons a cascading darkness that binds your target's feet, decreasing their movement rate, and doing 72 damage every 6 seconds for 1 min 36s.", "Cazic Portal": "Opens an arcane portal that teleports your entire group to the Temple of Cazic Thule.", "Celestial Tranquility": "Fills your body with celestial power, increasing your attack, attack speed, and armor class for up to 18 secs (3 ticks). Doesn't stack with some other ATK buffs such as Grim Aura, Firefist, and Strength of Nature. Superficially stacks with spell haste (such as that cast by enchanters and shamans) but only the larger of haste effects will actually apply. As other forms of spell haste, it will stack with worn haste and the Bards' Ervaj line of songs.", "Chaotic Feedback": "Strikes your target with a chaotic burst of mental energy, causing 32 damage and stunning targets below 55 for 1 seconds.", "Chill Sight": "Infuses your eyes with magical vision, allowing you to see clearly in the dark for instant.", "Chloroplast": "Hastens your target's natural healing, regenerating up to 19 hit points, and up to 10 endurance every 6 seconds for 20 min 30s.", "Clarity": "Calms your target's thoughts, allowing them to regenerate mana more quickly.", "Clinging Darkness": "Summons a clinging darkness that binds your target's feet, decreasing their movement rate, and does 8 damage every 6 seconds for 48s.", "Companion Spirit": "Summons a companion from const q=id=>document.getElementById(id),tip=q('tip');
[...new Set(R.map(r=>r.slot).filter(Boolean))].sort().forEach(s=>q('sl').add(new Option(s,s)));
[...new Set(R.flatMap(r=>r.tags.split(', ')).filter(Boolean))].sort().forEach(t=>q('tg').add(new Option(t,t)));
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const L=n=>'<a href="'+W+encodeURIComponent(n.replace(/ /g,'_'))+'" target="_blank">'+esc(n)+'</a>';
const D=d=>{if(d==='-'||!d)return '-';return d.split(' | ').map(z=>{const i=z.indexOf(': ');
 if(i<0)return L(z);
 return L(z.slice(0,i))+': '+z.slice(i+2).split(', ').map(L).join(', ');}).join('<br>');};
let k='effect',asc=true;
function render(){
 const s=q('q').value.toLowerCase(),ty=q('ty').value,sl=q('sl').value,tg=q('tg').value;
 let r=R.filter(x=>(!ty||x.type===ty)&&(!sl||x.slot===sl)&&(!tg||(x.tags||'').includes(tg))
  &&(!s||JSON.stringify(x).toLowerCase().includes(s)));
 r.sort((a,b)=>((a[k]||'')+'').localeCompare((b[k]||'')+'')*(asc?1:-1));
 q('c').textContent=r.length+' of '+R.length+' rows';
 var html='';
 for(var i=0;i<r.length;i++){var x=r[i];
  html+='<tr><td class="eff" data-e="'+esc(x.effect)+'">'+esc(x.effect)+'</td>'+
   '<td class="type">'+esc(x.type)+'</td>'+
   '<td class="item">'+L(x.item)+'</td>'+
   '<td>'+esc(x.slot)+'</td>'+
   '<td class="s">'+esc(x.classes)+'</td>'+
   '<td class="s">'+esc(x.race)+'</td>'+
   '<td class="s">'+esc(x.notrade)+'</td>'+
   '<td class="tags s">'+esc(x.tags)+'</td>'+
   '<td class="stats s">'+esc(x.stats)+'</td>'+
   '<td class="drops">'+D(x.drops)+'</td></tr>';
 }
 q('tb').innerHTML=html;
}
['q','ty','sl','tg'].forEach(i=>q(i).addEventListener('input',render));
document.querySelectorAll('th').forEach(t=>t.onclick=()=>{
 const nk=t.dataset.k;asc=(nk===k)?!asc:true;k=nk;render();});
function showTip(el,x,y){
 const d=DESC[el.dataset.e];
 if(!d){tip.style.display='none';return;}
 tip.textContent=d;tip.style.display='block';
 const w=tip.offsetWidth,h=tip.offsetHeight;
 tip.style.left=Math.min(x+12,innerWidth-w-8)+'px';
 tip.style.top=(y+16+h>innerHeight?y-h-8:y+16)+'px';
}
document.addEventListener('mouseover',e=>{if(e.target.classList.contains('eff'))showTip(e.target,e.clientX,e.clientY);});
document.addEventListener('mousemove',e=>{if(tip.style.display==='block'&&e.target.classList.contains('eff'))showTip(e.target,e.clientX,e.clientY);});
document.addEventListener('mouseout',e=>{if(e.target.classList.contains('eff'))tip.style.display='none';});
document.addEventListener('click',e=>{
 if(e.target.classList.contains('eff')){
   if(tip.style.display==='block'){tip.style.display='none';}
   else{const rc=e.target.getBoundingClientRect();showTip(e.target,rc.left,rc.top);}
 }else if(e.target!==tip){tip.style.display='none';}
});
render();
}catch(err){
document.body.insertAdjacentHTML('afterbegin',
'<div style="background:#7a1a1a;color:#fff;padding:12px;font:13px monospace;white-space:pre-wrap">ERROR: '+
(err&&err.message?err.message:err)+'</div>');
}
</script></body></html>
