 time of long term detrimental spells by 33%. This bonus will decay on spells over level 44.", "Allure": "Dominates your target's mind, allowing you to control them for a short time. This spell works on creatures up to level 51.", "Allure of Death": "Grips your body in an unholy darkness, slowly draining your hit points while regenerating your mana.", "Banish Undead": "A burst of holy power that inflicts 468 damage to an undead target.", "Berserker Strength": "Hardens your skin and fills your arms with energy, increasing strength and absorbing damage, while also decreasing your agility.", "Blanket of Forgetfulness": "Attacks the minds of all enemies in the vicinity of your target, providing a chance to forget those that have done them harm.", "Blaze": "Burns your target's skin with blazing flame, causing 418 damage.", "Blood Claw": "Poisons your target's blood, causing 20 initial damage and 15 damage every 6 seconds for up to 12 secs (2 ticks).", "Boneshear": "", "Brass Resonance 14": "Increases the power of brass instrument based bard songs by up to 140%.", "Burn": "Burns your target's skin with fire, causing 14 damage.", "Burning Affliction I": "Increases the damage of long term detrimental spells by up to 20%. This bonus will decay on spells over level 20.", "Burning Affliction II": "Increases the damage of long term detrimental spells by up to 20%. This bonus will decay on spells over level 44.", "Burning Affliction III": "Increases the damage of long term detrimental spells by up to 20%. This bonus will decay on spells over level 60.", "Burrowing Scarab": "Tiny scarabs burrow into your target's skin, causing 50 damage initially and 50 damage every 6 seconds for up to 3 minutes (1 ticks @L1 to 3.0 mins @L60).", "Burst of Flame": "Creates a ball of fire that burns your target, doing 5 damage.", "Cascading Darkness": "Summons a cascading darkness that binds your target's feet, decreasing their movement rate, and doing 72 damage every 6 seconds for 1 min 36s.", "Cazic Portal": "Opens an arcane portal that teleports your entire group to the Temple of Cazic Thule.", "Celestial Tranquility": "Fills your body with celestial power, increasing your attack, attack speed, and armor class for up to 18 secs (3 ticks). Doesn't stack with some other ATK buffs such as Grim Aura, Firefist, and Strength of Nature. Superficially stacks with spell haste (such as that cast by enchanters and shamans) but only the larger of haste effects will actually apply. As other forms of spell haste, it will stack with worn haste and the Bards' Ervaj line of songs.", "Chaotic Feedback": "Strikes your target with a chaotic burst of mental energy, causing 32 damage and stunning targets below 55 for 1 seconds.", "Chill Sight": "Infuses your eyes with magical vision, allowing you to see clearly in the dark for instant.", "Chloroplast": "Hastens your target's natural healing, regenerating up to 19 hit points, and up to 10 endurance every 6 seconds for 20 min 30s.", "Clarity": "Calms your target's thoughts, allowing them to regenerate mana more quickly.", "Clinging Darkness": "Summons a clinging darkness that binds your target's feet, decreasing their movement rate, and does 8 damage every 6 seconds for 48s.", "Companion Spirit": "Summons a companion from the spirit world in the form of a great wolf.", "Deadeye": "Allows your eyes the vision of the dead, providing night vision and the ability to see invisible creatures.", "Drain Soul": "Drains your target of life energy, siphoning between 400 and 406 hit points.", "Drones of Doom": "Commands a swarm of insects to attack your target relentlessly, causing 156 damage every six seconds for 48s.", "Enduring Breath": "Magically fills your lungs with air, removing your need to breathe for 27 min. Consumes a handful of Fish Scales to cast.", "Enhancement Haste I": "Reduces the cast time of long term beneficial spells by 30%. This bonus will decay on spells over level 20.", "Enhancement Haste II": "Reduces the cast time of long term beneficial spells by 30%. This bonus will decay on spells over level 44.", "Extended Enhancement I": "Increases the duration of beneficial spells by 15%. This bonus will decay on spells over level 20.", "Extended Enhancement II": "Increases the duration of beneficial spells by 15%. This bonus will decay on spells over level 44.", "Extended Enhancement III": "Increases the duration of beneficial spells by 15%. This bonus will decay on spells over lvl 60.", "Extended Range I": "Increases the range of spells by 15%. This bonus will decay on spells over level 20.", "Extended Range II": "Increases the range of spells by 15%. This bonus will decay on spells over level 44.", "Extended Range III": "Increases the range of spells by 15%. This bonus will decay on spells over level 60.", "Extinguish Fatigue": "Renews the endurance of your target, replenishing their stamina.", "Feign Death": "Causes you to stop breathing and appear dead to most creatures, until you stand up.", "Flame Arc": "Creates a circle of fire around you, causing between 171 and 181 damage to all nearby creatures.", "Frost Strike": "Creates a rift of bitter cold, causing 156 damage to your target.", "Frostreaver's Blessing": "Blesses you with the power of the ancient coldain heroes, increasing your regeneration rate, attack rating, and causes damage to anyone who attacks you. This effect does not stack with Call of Earth.", "Gather Shadows": "Calls shadows to conceal your body, allowing you to move undetected by many creatures for up to 20 min.", "Gravity Flux": "Two different incompatible versions of this spell exists in game. One is crafted by Wizards and the other is crafted by Enchanters. Causes a sudden reversal in the gravity around your target, doing 214 damage. Only hits 4 mobs max. Please confirm damage at various levels. Quad-kiting Wizards are recommended to use the more mana efficient Circle of Force until level 51, then Pillar of Frost. This spell has an alternate use to project yourself/duel to locations not easily accessible like ramparts of CoM. When cast by NPCs, this spell can be very dangerous against players, as fall damage can be very brutal, especially if they are overweight or fall off nearby cliffs. Levitate and Dead Man Floating can counter this risk.", "Grim Aura": "Surrounds you in a dark aura, increasing your attack rating.", "Harmshield": "Completely removes your reaction to pain for 18s, rendering you invulnerable to damage.", "Haste": "You feel faster.", "Holy Might": "Strikes an enemy with holy might, briefly stunning them and causing 60 damage. This spell works on creatures up to level 55.", "Ice Shock": "Covers your target in a thick layer of ice, causing between 490 and 539 damage.", "Identify": "Provides magical information about the item that your target is holding. To use the spell on yourself, pick the item you want to identify from your inventory by left clicking it, so that it's held on your cursor (as if you were moving the item). Then, with the item held on your cursor, target yourself and cast the spell. To use the spell on others, have them hold their item to be identified on their cursor while you cast the spell on them.", "Illusion: Dark Elf": "Cloaks you in a shimmering illusion that makes you appear to be a Dark Elf.", "Improved Damage I": "Increases the damage of spells by up to 20%. This bonus will decay on spells over level 20.", "Improved Damage II": "Increases the damage of spells by up to 20%. This bonus will decay on spells over level 44.", "Improved Damage III": "Increases the damage of spells by up to 20%. This bonus will decay on spells over level 60.", "Improved Healing I": "Increases the potency of healing spells by up to 20%. This bonus will decay on spells over level 20.", "Improved Healing III": "Increases the potency of healing spells by up to 20%. This bonus will decay on spells over level 60.", "Invisibility": "Cloaks your target in a mystic veil, making them invisible to many creatures.",  q('vB').style.display='';q('vC').style.display='none';q('hB').style.display='';q('hC').style.display='none';};
q('mC').onclick=function(){q('mC').className='on';q('mB').className='';
 q('vC').style.display='';q('vB').style.display='none';q('hC').style.display='flex';q('hB').style.display='none';};
// ---- character mode ----
var EQUIP=['Head','Face','Ear','Neck','Shoulders','Arms','Back','Wrist','Hands','Primary','Secondary','Range','Fingers','Chest','Legs','Feet','Waist','Ammo','Any Slot','Charm','Held'];
var CHAR=null;
q('file').addEventListener('change',function(ev){
 var f=ev.target.files[0];if(!f)return;
 var rd=new FileReader();
 rd.onload=function(){parseChar(String(rd.result),f.name);};
 rd.readAsText(f);
});
function parseChar(text,fname){
 var lines=text.split(NL),rows=[];
 for(var i=1;i<lines.length;i++){
  var p=lines[i].split(TAB);
  if(p.length>=2&&p[1])rows.push({loc:p[0].trim(),name:p[1].trim()});
 }
 // equipped items + their sockets
 var equipped=[],cur=null;
 for(var j=0;j<rows.length;j++){var r0=rows[j];
  var isTop=EQUIP.indexOf(r0.loc)>=0;
  if(isTop){
   if(r0.name!=='Empty'){cur={loc:r0.loc,name:r0.name,socks:{}};equipped.push(cur);}
   else cur=null;
   continue;}
  if(cur&&r0.loc.indexOf(cur.loc+'-Slot')===0){
   var sn=r0.loc.substring((cur.loc+'-Slot').length);
   if(SOCK[sn])cur.socks[SOCK[sn]]=(r0.name==='Empty')?null:r0.name;
  }
 }
 // banked/bagged exaltations
 var banked=[];
 for(var b=0;b<rows.length;b++){
  if(rows[b].name.indexOf('(Exaltation)')>0&&EQUIP.indexOf(rows[b].loc.split('-')[0])<0)
   banked.push(rows[b].name.replace(' (Exaltation)','').trim());
 }
 // class inference: score by equipped items class lists
 var score={};CLS.forEach(function(c){score[c]=0;});
 equipped.forEach(function(e){
  var base=e.name.replace(/ \+\d+$/,'');
  var meta=META[base];
  if(meta){var cl=classList(meta.classes);
   if(cl.length<CLS.length)cl.forEach(function(c){score[c]+=1;});}
 });
 var guess=CLS.slice().sort(function(a,b){return score[b]-score[a];}).slice(0,3);
 ['d1','d2','d3'].forEach(function(id,ix){q(id).value=score[guess[ix]]>0?guess[ix]:'';});
 CHAR={equipped:equipped,banked:banked,name:fname.replace('.txt','')};
 q('charname').textContent=CHAR.name;q('charname').style.display='';
 renderGaps();
}
['d1','d2','d3'].forEach(function(id){q(id).addEventListener('input',renderGaps);});
function renderGaps(){
 if(!CHAR)return;
 var trio=['d1','d2','d3'].map(function(id){return q(id).value}).filter(Boolean);
 var h='';
 CHAR.equipped.forEach(function(e){
  var base=e.name.replace(/ \+\d+$/,'');
  var meta=META[base];
  var itemCl=meta?classList(meta.classes):null;
  h+='<div class="card"><h3>'+(meta&&meta.icon?icon(meta.icon):'')+esc(e.name)+'</h3>';
  h+='<div class="meta">'+esc(e.loc)+(meta?' &middot; '+esc(meta.classes||'')+' &middot; '+esc(meta.slot||''):' &middot; not in effect database (no legality data)')+'</div>';
  var types=['focus','click','worn','proc'];
  for(var t=0;t<types.length;t++){var ty=types[t];
   if(!(ty in e.socks))continue; // socket not unlocked at this tier
   var v=e.socks[ty];
   if(v){h+='<div class="sock filled">&#10003; '+ty.toUpperCase()+': '+esc(v.replace(' (Exaltation)',''))+'</div>';}
   else{
    h+='<div class="sock gap">&#9888; '+ty.toUpperCase()+' slot empty</div>';
    var opts=R.filter(function(x){
     if(x.type!==ty)return false;
     var srcCl=classList(x.classes);
     if(itemCl&&!overlap(srcCl,itemCl))return false;
     if(trio.length&&!overlap(trio,srcCl))return false;
     return true;});
    var shown=0;
    for(var o=0;o<opts.length&&shown<6;o++){var x=opts[o];shown++;
     var srcCl=classList(x.classes),warn='';
     if(itemCl){var iv=inter(srcCl,itemCl);
      if(iv.length<itemCl.length)warn=' <span class="warn">restricts item to '+iv.join('/')+'</span>';}
     var slotWarn=(meta&&x.slot&&meta.slot&&x.slot!==meta.slot)?' <span class="warn">[source slot: '+esc(x.slot)+']</span>':'';
     var bank=(CHAR.banked.indexOf(x.item)>=0)?' <span class="pill">in your bags</span>':'';
     h+='<div class="opt"><span class="eff" data-e="'+esc(x.effect)+'">'+esc(x.effect)+'</span> &mdash; '+icon(x.icon)+L(x.item)+bank+warn+slotWarn+'<br>'+dropsHtml(x.drops)+'</div>';
    }
    if(!shown)h+='<div class="opt">No legal options found for your classes.</div>';
   }
  }
  h+='</div>';
 });
 q('gaps').innerHTML=h;
}
render();
}catch(err){
document.body.insertAdjacentHTML('afterbegin','<div style="background:#7a1a1a;color:#fff;padding:12px;font:13px monospace;white-space:pre-wrap">ERROR: '+(err&&err.message?err.message:err)+'</div>');
}
</script></body></html>
